name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.96"
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - '**/*.{js,ts,jsx,tsx,json,jsonc,css,mjs,cjs}'
              - 'bun.lockb'
              - 'package.json'
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'

  lint-ts:
    name: Lint TypeScript
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          cache: bun
      - run: bun install --frozen-lockfile
      - run: bun run check

  test-ts:
    name: Test TypeScript
    needs: [detect-changes, lint-ts]
    if: ${{ needs.detect-changes.outputs.typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          cache: bun

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: swatinem/rust-cache@v2

      - run: bun install --frozen-lockfile
      - run: bun run test

  lint-rs:
    name: Lint Rust
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2

      - run: cargo fmt -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  features-rs:
    name: Feature Matrix (tunnet-core)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--no-default-features --features managed"
          - "--no-default-features --features direct"
          - "--all-features"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: swatinem/rust-cache@v2
      - run: cargo check -p tunnet-core ${{ matrix.features }}
      - run: cargo check -p tunnet --features managed

  test-rs:
    name: Test Rust
    needs: [detect-changes, lint-rs]
    if: ${{ needs.detect-changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: swatinem/rust-cache@v2

      - run: cargo test --workspace
