name: tunnet

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tunnet
      POSTGRES_PASSWORD: tunnet
      POSTGRES_DB: tunnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunnet"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile.management
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tunnet:tunnet@postgres:5432/tunnet
    entrypoint: ["sh", "-c", "cd packages/db && bunx drizzle-kit migrate"]
    restart: "no"

  control:
    build:
      context: .
      dockerfile: deploy/Dockerfile.control
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "9090:9090"
      - "9091:9091"
    environment:
      DATABASE_URL: postgres://tunnet:tunnet@postgres:5432/tunnet
      DASHBOARD_URL: "http://localhost:5173"
      CONTROL_PLANE_URL: "http://control:8080"
      TUNNET_BIND: "0.0.0.0:8080"
      TUNNET_ADMIN_BIND: "0.0.0.0:9091"
      TUNNET_SERVICE_SECRET: "${TUNNET_SERVICE_SECRET:-change-me-to-a-random-secret-at-least-32-chars}"
      TUNNET_JSON_LOGS: "true"
    healthcheck:
      test: ["CMD", "tunnet-control", "--help"]
      interval: 10s
      timeout: 3s
      start_period: 15s

  management:
    build:
      context: .
      dockerfile: deploy/Dockerfile.management
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      control:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://tunnet:tunnet@postgres:5432/tunnet
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change-me-to-a-random-secret-at-least-32-chars}"
      DASHBOARD_URL: "http://localhost:5173"
      MANAGEMENT_URL: "http://localhost:3000"
      CONTROL_PLANE_URL: "http://control:8080"
      TUNNET_SERVICE_SECRET: "${TUNNET_SERVICE_SECRET:-change-me-to-a-random-secret-at-least-32-chars}"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: deploy/Dockerfile.dashboard
      args:
        MANAGEMENT_URL: "http://management:3000"
        CONTROL_PLANE_URL: "http://control:8080"
    restart: unless-stopped
    depends_on:
      management:
        condition: service_healthy
    ports:
      - "5173:3000"
    environment:
      DASHBOARD_URL: "http://localhost:5173"
      MANAGEMENT_URL: "http://management:3000"
      CONTROL_PLANE_URL: "http://control:8080"

volumes:
  pgdata:
