{{- if .Values.webhook.enabled }}
{{- $ns := include "tunnet-operator.namespace" . -}}
{{- $svc := include "tunnet-operator.webhookServiceName" . -}}
{{- $secretName := printf "%s-webhook-tls" (include "tunnet-operator.fullname" .) -}}
{{- $cn := printf "%s.%s.svc" $svc $ns -}}
{{- $altNames := list $cn (printf "%s.cluster.local" $cn) -}}
{{- $ca := genCA "tunnet-operator-webhook-ca" 3650 -}}
{{- $cert := genSignedCert $cn nil $altNames 3650 $ca -}}
{{- $existing := lookup "v1" "Secret" $ns $secretName -}}
{{- if $existing }}
{{- $ca = dict "Cert" (index $existing.data "ca.crt" | b64dec) -}}
{{- $cert = dict "Cert" (index $existing.data "tls.crt" | b64dec) "Key" (index $existing.data "tls.key" | b64dec) -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tunnet-operator.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if $existing }}
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
  ca.crt: {{ index $existing.data "ca.crt" }}
  {{- else }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
  {{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "tunnet-operator.fullname" . }}-sidecar
  labels:
    {{- include "tunnet-operator.labels" . | nindent 4 }}
webhooks:
  - name: sidecar.tunnet.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ $svc }}
        namespace: {{ $ns }}
        path: /mutate
        port: 443
      {{- if $existing }}
      caBundle: {{ index $existing.data "ca.crt" }}
      {{- else }}
      caBundle: {{ $ca.Cert | b64enc }}
      {{- end }}
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    sideEffects: None
    timeoutSeconds: 10
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
{{- end }}
